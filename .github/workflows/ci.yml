name: CI

on:
  pull_request:
  push:
    branches: [main, dev]

jobs:
  example:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout argus-plugins
        uses: actions/checkout@v4
        with:
          path: argus-plugins

      - name: Checkout argus-plugin-sdk
        uses: actions/checkout@v4
        with:
          repository: antoine-lombardo/argus-plugin-sdk
          path: argus-plugin-sdk

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install zip
        run: sudo apt-get update && sudo apt-get install -y zip

      - name: Install, typecheck, build, pack
        working-directory: argus-plugins/packages/example
        env:
          ARGUS_PLUGIN_BUILD: "1"
        run: |
          npm ci
          npm run build --prefix "$GITHUB_WORKSPACE/argus-plugin-sdk"
          npm run typecheck
          npm run build
          npm run pack
