name: Publish experimental

on:
  push:
    branches: [dev]
    paths:
      - "packages/**"
      - "scripts/**"
      - ".github/workflows/publish-experimental.yml"
  workflow_dispatch:

concurrency:
  group: publish-experimental
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout argus-plugins
        uses: actions/checkout@v4
        with:
          path: argus-plugins

      - name: Checkout argus-plugin-sdk
        uses: actions/checkout@v4
        with:
          repository: antoine-lombardo/argus-plugin-sdk
          path: argus-plugin-sdk

      - name: Checkout argus-repo-index
        uses: actions/checkout@v4
        with:
          repository: antoine-lombardo/argus-repo-index
          token: ${{ secrets.REPO_INDEX_TOKEN }}
          path: argus-repo-index

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install zip
        run: sudo apt-get update && sudo apt-get install -y zip

      - name: Publish example to experimental channel
        working-directory: argus-plugins
        run: |
          npm run build --prefix "$GITHUB_WORKSPACE/argus-plugin-sdk"
          node scripts/publish-to-index.mjs \
            --package packages/example \
            --channel experimental \
            --index-repo "$GITHUB_WORKSPACE/argus-repo-index"

      - name: Commit and push index
        working-directory: argus-repo-index
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No index changes"
            exit 0
          fi
          git commit -m "chore: publish experimental plugin build from argus-plugins@${GITHUB_SHA::7}"
          git push
